document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"6ad76754-b160-4884-9cfa-73b95c926b0d\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n\n<helmet>\n<style>\n  @keyframes spin { to { transform: rotate(360deg); } }\n  @keyframes ripple { from { transform: scale(.25); opacity:.45; } to { transform: scale(1.7); opacity:0; } }\n  @keyframes rowIn { from { transform: translateY(8px); } to { transform: translateY(0); } }\n  @keyframes modalIn { from { transform: scale(.93); } to { transform: scale(1); } }\n  @keyframes scrimIn { from { opacity:0; } to { opacity:1; } }\n  @keyframes pop { from { transform: scale(.5); } 60% { transform: scale(1.1); } to { transform: scale(1); } }\n  html,body { margin:0; padding:0; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div ref=\"{{ setWrap }}\" data-screen-label=\"Verification flow V3\" style=\"position:relative; width:100%; min-height:100%; background:#CFCFDB; overflow:hidden; font-family:-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;\">\n  <div style=\"width:100%; height:{{ sizerH }}px;\">\n  <div style=\"width:1040px; height:600px; transform:scale({{ scaleV }}); transform-origin:top left; overflow:hidden; box-shadow:0 24px 70px rgba(35,35,70,.30); background:#ECECF6; display:flex; flex-direction:column;\">\n\n    <!-- Browser chrome -->\n    <div style=\"height:46px; flex:none; display:flex; align-items:center; padding:0 18px; background:#E4E4EC; border-bottom:1px solid #D7D7E0;\">\n      <div style=\"width:64px; display:flex; align-items:center; gap:8px;\">\n        <span style=\"width:12px; height:12px; border-radius:50%; background:#F2655B;\"><\u002Fspan>\n        <span style=\"width:12px; height:12px; border-radius:50%; background:#F5BE4F;\"><\u002Fspan>\n        <span style=\"width:12px; height:12px; border-radius:50%; background:#62C554;\"><\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"flex:1; max-width:480px; margin:0 auto; height:28px; background:#fff; border-radius:14px; display:flex; align-items:center; justify-content:center; gap:8px; font-size:12.5px; color:#6B7280;\">\n        <svg width=\"11\" height=\"12\" viewBox=\"0 0 12 13\"><rect x=\"1.5\" y=\"5.5\" width=\"9\" height=\"6.5\" rx=\"1.5\" fill=\"#9AA1AC\"><\u002Frect><path d=\"M3.4 5.5V3.8a2.6 2.6 0 0 1 5.2 0V5.5\" fill=\"none\" stroke=\"#9AA1AC\" stroke-width=\"1.3\"><\u002Fpath><\u002Fsvg>\n        <span>adviser.app/clients/verification<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"width:64px;\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- Browser content -->\n    <div ref=\"{{ setContent }}\" style=\"flex:1; position:relative; display:flex; align-items:flex-start; justify-content:center; padding-top:30px; box-sizing:border-box; background:#ECECF6;\">\n\n      <!-- Verification card -->\n      <div style=\"width:460px; box-sizing:border-box; background:#fff; border-radius:16px; padding:24px 26px 22px; box-shadow:0 10px 34px rgba(40,40,80,.12);\">\n        <div style=\"opacity:{{ contentOpacity }}; transition:opacity .22s ease;\">\n          <div style=\"font-size:19px; font-weight:700; color:#15151E; margin-bottom:6px;\">Client verification<\u002Fdiv>\n          <div style=\"font-size:13px; color:#6B7280; margin-bottom:6px;\">Verify your client’s identity using a selfie.<\u002Fdiv>\n\n          <!-- Stepper -->\n          <div style=\"margin-top:16px; display:flex; flex-direction:column;\">\n\n            <!-- STEP 1 -->\n            <div style=\"display:flex; gap:13px;\">\n              <div style=\"display:flex; flex-direction:column; align-items:center; flex:none; width:16px; padding-top:2px;\">\n                <sc-if value=\"{{ isStart }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:13px; height:13px; border-radius:50%; background:#2F6FED; box-shadow:0 0 0 3px rgba(47,111,237,.16);\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ node1Done }}\"><span style=\"width:9px; height:9px; border-radius:50%; background:#BFC4D0; margin:2px 0;\"><\u002Fspan><\u002Fsc-if>\n                <div style=\"width:2px; flex:1; min-height:16px; background:#E2E4EC; margin-top:5px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1; padding-bottom:30px;\">\n                <div style=\"font-size:14px; font-weight:{{ step1Weight }}; color:{{ step1Color }};\">Send a link to your client<\u002Fdiv>\n                <sc-if value=\"{{ isStart }}\">\n                  <button data-act=\"choose\" style=\"margin-top:9px; height:34px; padding:0 16px; border:1.5px solid #C7CBD3; border-radius:8px; background:{{ chooseBg }}; font-size:13px; font-weight:600; color:#15151E; font-family:inherit; cursor:default; transition:background .12s ease;\">Choose method<\u002Fbutton>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ linkSent }}\">\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-top:9px;\">\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\" style=\"flex:none;\"><circle cx=\"10\" cy=\"10\" r=\"9\" fill=\"#16A34A\"><\u002Fcircle><path d=\"M5.8 10.2l2.6 2.6 5.3-5.6\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-size:13px; color:#1f2430;\">SMS sent at 15:15 on 22-10-2024.<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:14px; margin-top:7px; margin-left:24px;\">\n                    <span data-act=\"another\" style=\"font-size:13px; font-weight:700; color:#15151E; text-decoration:underline;\">Choose another method<\u002Fspan>\n                    <span style=\"font-size:12.5px; color:#9AA1AC;\">2/3 SMSes left<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- STEP 2 -->\n            <div style=\"display:flex; gap:13px;\">\n              <div style=\"display:flex; flex-direction:column; align-items:center; flex:none; width:16px; padding-top:2px;\">\n                <sc-if value=\"{{ node2Pending }}\"><span style=\"width:11px; height:11px; border-radius:50%; border:2px solid #CBD0D9; background:#fff; box-sizing:border-box;\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ node2Active }}\"><span style=\"width:13px; height:13px; border-radius:50%; background:#2F6FED; box-shadow:0 0 0 3px rgba(47,111,237,.16);\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ node2Done }}\"><span style=\"width:9px; height:9px; border-radius:50%; background:#BFC4D0; margin:2px 0;\"><\u002Fspan><\u002Fsc-if>\n                <div style=\"width:2px; flex:1; min-height:16px; background:#E2E4EC; margin-top:5px;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div style=\"flex:1; padding-bottom:30px;\">\n                <div style=\"font-size:14px; font-weight:{{ step2Weight }}; color:{{ step2Color }};\">Wait for selfie<\u002Fdiv>\n                <sc-if value=\"{{ step2SentOnly }}\">\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-top:9px;\">\n                    <svg width=\"15\" height=\"15\" viewBox=\"0 0 20 20\" style=\"flex:none;\" fill=\"none\" stroke=\"#9AA1AC\" stroke-width=\"1.6\"><circle cx=\"10\" cy=\"10\" r=\"8\"><\u002Fcircle><path d=\"M10 5.6V10l3 1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-size:13px; color:#6B7280;\">Selfie link not opened yet<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ isOpened }}\">\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-top:9px;\">\n                    <svg width=\"16\" height=\"16\" viewBox=\"0 0 20 20\" style=\"flex:none;\"><circle cx=\"10\" cy=\"10\" r=\"9\" fill=\"#16A34A\"><\u002Fcircle><path d=\"M5.8 10.2l2.6 2.6 5.3-5.6\" fill=\"none\" stroke=\"#fff\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-size:13px; color:#1f2430;\">Selfie link opened<\u002Fspan>\n                  <\u002Fdiv>\n                  <div style=\"display:flex; align-items:center; gap:8px; margin-top:7px;\">\n                    <svg width=\"15\" height=\"15\" viewBox=\"0 0 20 20\" style=\"flex:none;\" fill=\"none\" stroke=\"#9AA1AC\" stroke-width=\"1.6\"><circle cx=\"10\" cy=\"10\" r=\"8\"><\u002Fcircle><path d=\"M10 5.6V10l3 1.9\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                    <span style=\"font-size:13px; color:#6B7280;\">No selfie yet<\u002Fspan>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n                <sc-if value=\"{{ isError }}\">\n                  <div style=\"margin-top:11px; display:flex; gap:10px; align-items:flex-start; padding:12px 14px; border-radius:10px; background:#FCF3D9; animation:rowIn .4s cubic-bezier(.2,.8,.3,1);\">\n                    <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" style=\"flex:none; margin-top:1px;\"><circle cx=\"10\" cy=\"10\" r=\"9\" fill=\"#E0A82E\"><\u002Fcircle><rect x=\"9.1\" y=\"5.2\" width=\"1.8\" height=\"6\" rx=\"0.9\" fill=\"#fff\"><\u002Frect><circle cx=\"10\" cy=\"14\" r=\"1.15\" fill=\"#fff\"><\u002Fcircle><\u002Fsvg>\n                    <div>\n                      <div style=\"font-size:13px; color:#5A4B1C; line-height:1.45;\">The client’s device settings is blocking the camera from working.<\u002Fdiv>\n                      <div style=\"margin-top:4px; font-size:13px; font-weight:600; color:#8A6D18; text-decoration:underline;\">Here’s what to do:<\u002Fdiv>\n                    <\u002Fdiv>\n                  <\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n            <!-- STEP 3 -->\n            <div style=\"display:flex; gap:13px;\">\n              <div style=\"display:flex; flex-direction:column; align-items:center; flex:none; width:16px; padding-top:2px;\">\n                <sc-if value=\"{{ node3Pending }}\"><span style=\"width:11px; height:11px; border-radius:50%; border:2px solid #CBD0D9; background:#fff; box-sizing:border-box;\"><\u002Fspan><\u002Fsc-if>\n                <sc-if value=\"{{ node3Complete }}\"><span style=\"width:13px; height:13px; border-radius:50%; background:#16A34A; box-shadow:0 0 0 3px rgba(22,163,74,.16); animation:pop .42s cubic-bezier(.2,.8,.3,1.4);\"><\u002Fspan><\u002Fsc-if>\n              <\u002Fdiv>\n              <div style=\"flex:1;\">\n                <div style=\"font-size:14px; font-weight:{{ step3Weight }}; color:{{ step3Color }};\">Verification complete<\u002Fdiv>\n                <sc-if value=\"{{ isComplete }}\">\n                  <div style=\"margin-top:5px; font-size:13px; color:#6B7280;\">Risk: Low<\u002Fdiv>\n                <\u002Fsc-if>\n              <\u002Fdiv>\n            <\u002Fdiv>\n\n          <\u002Fdiv>\n\n          <!-- Copy link -->\n          <sc-if value=\"{{ showCopyLink }}\">\n            <div style=\"margin-top:16px;\">\n              <div style=\"font-size:13px; color:#6B7280; margin-bottom:9px;\">Copy the link to share with your client directly<\u002Fdiv>\n              <div style=\"display:flex; gap:10px; align-items:center;\">\n                <div style=\"flex:1; height:40px; border:1px solid #D7DAE2; border-radius:9px; display:flex; align-items:center; padding:0 13px; font-size:12.5px; color:#5B6472; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;\">www.thisisthesprinthivelink.co.za/start/verificatio…<\u002Fdiv>\n                <button style=\"flex:none; height:40px; padding:0 16px; border:1.5px solid #C7CBD3; border-radius:9px; background:#fff; font-size:13px; font-weight:600; color:#15151E; display:inline-flex; align-items:center; gap:7px; font-family:inherit; cursor:default;\">\n                  <svg width=\"15\" height=\"15\" viewBox=\"0 0 20 20\" fill=\"none\" stroke=\"#15151E\" stroke-width=\"1.7\"><path d=\"M8 11.5a3 3 0 0 0 4.3.3l2.4-2.4a3 3 0 1 0-4.2-4.2l-1 1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><path d=\"M12 8.5a3 3 0 0 0-4.3-.3L5.3 10.6a3 3 0 1 0 4.2 4.2l1-1\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n                  Copy link\n                <\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- POPUP: choose method -->\n      <sc-if value=\"{{ popupOpen }}\">\n        <div style=\"position:absolute; inset:0; background:rgba(20,22,44,.34); display:flex; align-items:center; justify-content:center; z-index:40; animation:scrimIn .2s ease;\">\n          <div style=\"width:560px; max-width:88%; background:#fff; border-radius:16px; box-shadow:0 26px 72px rgba(18,20,48,.34); padding:26px 28px; animation:modalIn .26s cubic-bezier(.2,.8,.3,1.05);\">\n            <div style=\"font-size:17px; font-weight:700; color:#15151E; margin-bottom:5px;\">Choose how to send the selfie link<\u002Fdiv>\n            <div style=\"font-size:12.5px; color:#9AA1AC; margin-bottom:18px;\">There is no time limit to use the link once it is sent.<\u002Fdiv>\n\n            <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:14px;\">\n              <span style=\"position:relative; width:20px; height:20px; flex:none;\">\n                <svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\"><circle cx=\"10\" cy=\"10\" r=\"8.5\" fill=\"none\" stroke=\"#2F6FED\" stroke-width=\"2\"><\u002Fcircle><\u002Fsvg>\n                <span style=\"position:absolute; left:5px; top:5px; width:10px; height:10px; border-radius:50%; background:#2F6FED;\"><\u002Fspan>\n              <\u002Fspan>\n              <span style=\"font-size:14px; color:#1f2430;\">Send selfie link to the client by SMS<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:14px;\">\n              <span style=\"width:20px; height:20px; flex:none;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\"><circle cx=\"10\" cy=\"10\" r=\"8.5\" fill=\"none\" stroke=\"#9AA1AC\" stroke-width=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n              <span style=\"font-size:14px; color:#1f2430;\">Open the link on your device<\u002Fspan>\n            <\u002Fdiv>\n            <div style=\"display:flex; align-items:center; gap:11px; margin-bottom:4px;\">\n              <span style=\"width:20px; height:20px; flex:none;\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 20 20\"><circle cx=\"10\" cy=\"10\" r=\"8.5\" fill=\"none\" stroke=\"#9AA1AC\" stroke-width=\"2\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n              <span style=\"font-size:14px; color:#1f2430;\">Send selfie link to the client’s email<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"margin-top:18px; display:flex; gap:10px; align-items:flex-start; padding:13px 15px; border-radius:10px; background:#EAF2FB;\">\n              <svg width=\"18\" height=\"18\" viewBox=\"0 0 20 20\" style=\"flex:none; margin-top:1px;\"><circle cx=\"10\" cy=\"10\" r=\"9\" fill=\"#1E5B9E\"><\u002Fcircle><circle cx=\"10\" cy=\"6.2\" r=\"1.15\" fill=\"#fff\"><\u002Fcircle><rect x=\"9.1\" y=\"8.6\" width=\"1.8\" height=\"5.6\" rx=\"0.9\" fill=\"#fff\"><\u002Frect><\u002Fsvg>\n              <span style=\"font-size:13px; color:#274B66; line-height:1.45;\">An SMS will be sent to 082 123 1234. You can resend it up to three times.<\u002Fspan>\n            <\u002Fdiv>\n\n            <div style=\"display:flex; gap:12px; margin-top:20px;\">\n              <button data-act=\"cancel\" style=\"height:38px; padding:0 18px; border:1.5px solid #C7CBD3; border-radius:8px; background:#fff; font-size:13.5px; font-weight:600; color:#15151E; font-family:inherit; cursor:default;\">Cancel<\u002Fbutton>\n              <button data-act=\"continue\" style=\"height:38px; padding:0 22px; border:none; border-radius:8px; background:{{ continueBg }}; color:#fff; font-size:13.5px; font-weight:600; font-family:inherit; cursor:default; display:inline-flex; align-items:center; gap:8px; transition:background .15s ease;\">\n                <sc-if value=\"{{ sending }}\"><span style=\"width:14px; height:14px; border:2px solid rgba(255,255,255,.45); border-top-color:#fff; border-radius:50%; animation:spin .7s linear infinite; display:inline-block;\"><\u002Fspan><\u002Fsc-if>\n                <span>{{ continueLabel }}<\u002Fspan>\n              <\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- Cursor -->\n      <sc-if value=\"{{ cursorVisible }}\" hint-placeholder-val=\"{{ true }}\">\n        <div style=\"position:absolute; left:0; top:0; transform:translate({{ cursorX }}px, {{ cursorY }}px); transition:transform .62s cubic-bezier(.33,0,.2,1); pointer-events:none; z-index:60;\">\n          <sc-if value=\"{{ clickFx }}\">\n            <span style=\"position:absolute; left:-15px; top:-13px; width:34px; height:34px; border:2px solid rgba(47,111,237,.7); border-radius:50%; animation:ripple .5s ease-out forwards;\"><\u002Fspan>\n          <\u002Fsc-if>\n          <svg width=\"26\" height=\"26\" viewBox=\"0 0 24 24\" style=\"filter:drop-shadow(0 1px 2px rgba(0,0,0,.3));\"><path d=\"M5 3 L5 21 L9.6 16.7 L12.7 23 L15.5 21.7 L12.4 15.5 L18.2 15.5 Z\" fill=\"#111\" stroke=\"#fff\" stroke-width=\"1.3\" stroke-linejoin=\"round\"><\u002Fpath><\u002Fsvg>\n        <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1040,&quot;height&quot;:600},&quot;speed&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Slow&quot;,&quot;Normal&quot;,&quot;Fast&quot;],&quot;default&quot;:&quot;Normal&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showCursor&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = Object.assign(this.defaults(), { scaleV: 1, sizerH: 520 });\n\n  defaults() {\n    return {\n      phase: 'start', fading: false, popupOpen: false, sending: false,\n      pressed: null, clickFx: false, cursor: { x: 240, y: 300 }\n    };\n  }\n\n  setWrap = (el) => { if (el) this.wrapEl = el; };\n  setContent = (el) => { if (el) this.contentEl = el; };\n\n  componentDidMount() {\n    this.alive = true;\n    this.scale = 1;\n    this.mult = ({ Slow: 1.4, Normal: 1, Fast: 0.62 }[this.props.speed]) || 1;\n    this._onResize = () => this.computeScale();\n    window.addEventListener('resize', this._onResize);\n    this.computeScale();\n    this.run();\n  }\n  componentWillUnmount() {\n    this.alive = false;\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  computeScale() {\n    if (!this.wrapEl) return;\n    const w = this.wrapEl.clientWidth;\n    this.scale = (w / 1040) || 1;\n    this.setState({ scaleV: this.scale, sizerH: Math.round(600 * this.scale) });\n  }\n\n  s(ms) { return new Promise(r => setTimeout(r, ms * (this.mult || 1))); }\n\n  async run() {\n    await this.s(300);\n    while (this.alive) {\n      await this.play();\n      if (!this.alive) break;\n      this.setState({ fading: true });\n      await this.s(520);\n    }\n  }\n\n  async play() {\n    this.setState(Object.assign(this.defaults(), { fading: true }));\n    await this.s(70);\n    this.setState({ fading: false });\n    await this.s(950);\n\n    // open popup\n    await this.moveTo('[data-act=\"choose\"]', 720);\n    await this.click('choose');\n    this.setState({ popupOpen: true });\n    await this.s(1350);\n\n    // continue -> link sent\n    await this.moveTo('[data-act=\"continue\"]', 780);\n    await this.click('continue');\n    this.setState({ sending: true });\n    await this.s(950);\n    this.setState({ popupOpen: false, sending: false, phase: 'sent' });\n    await this.s(1700);\n\n    // selfie link opened\n    this.setState({ phase: 'opened' });\n    await this.s(1700);\n\n    // device error\n    this.setState({ phase: 'error' });\n    await this.s(2700);\n\n    // complete\n    await this.fadeSwap('complete');\n    await this.s(2700);\n  }\n\n  async fadeSwap(next) {\n    this.setState({ fading: true });\n    await this.s(230);\n    this.setState({ phase: next });\n    await this.s(40);\n    this.setState({ fading: false });\n    await this.s(260);\n  }\n\n  async click(name) {\n    this.setState({ pressed: name, clickFx: true });\n    await this.s(170);\n    this.setState({ pressed: null });\n    await this.s(110);\n    this.setState({ clickFx: false });\n  }\n\n  async moveTo(sel, dur) {\n    const c = this.contentEl;\n    if (c) {\n      const t = c.querySelector(sel);\n      if (t) {\n        const cr = c.getBoundingClientRect(), tr = t.getBoundingClientRect();\n        const x = (tr.left + tr.width / 2 - cr.left) / (this.scale || 1);\n        const y = (tr.top + tr.height / 2 - cr.top) / (this.scale || 1);\n        this.setState({ cursor: { x, y } });\n      }\n    }\n    await this.s(dur);\n  }\n\n  renderVals() {\n    const st = this.state;\n    const p = st.phase;\n    const isStart = p === 'start';\n    const linkSent = p === 'sent' || p === 'opened' || p === 'error';\n    const isOpened = p === 'opened' || p === 'error';\n    const isError = p === 'error';\n    const isComplete = p === 'complete';\n    return {\n      setWrap: this.setWrap,\n      setContent: this.setContent,\n      scaleV: st.scaleV,\n      sizerH: st.sizerH,\n      contentOpacity: st.fading ? 0 : 1,\n\n      isStart, linkSent, isOpened, isError, isComplete,\n      step2SentOnly: p === 'sent',\n      showCopyLink: linkSent,\n\n      node1Done: !isStart,\n      node2Pending: isStart,\n      node2Active: linkSent,\n      node2Done: isComplete,\n      node3Pending: !isComplete,\n      node3Complete: isComplete,\n\n      step1Color: isStart ? '#15151E' : (isComplete ? '#9AA1AC' : '#3A414D'),\n      step1Weight: isStart ? '700' : '500',\n      step2Color: linkSent ? '#15151E' : '#9AA1AC',\n      step2Weight: linkSent ? '700' : '500',\n      step3Color: isComplete ? '#15151E' : '#9AA1AC',\n      step3Weight: isComplete ? '700' : '500',\n\n      popupOpen: st.popupOpen,\n      sending: st.sending,\n      continueLabel: st.sending ? 'Sending\\u2026' : 'Continue',\n      continueBg: st.pressed === 'continue' ? '#114a99' : '#1763C6',\n      chooseBg: st.pressed === 'choose' ? '#EEF0F4' : '#ffffff',\n\n      cursorVisible: this.props.showCursor !== false,\n      cursorX: st.cursor.x,\n      cursorY: st.cursor.y,\n      clickFx: st.clickFx\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
